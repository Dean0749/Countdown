<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Countdown - MUJI Hand-crafted Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Inter:wght@200;300;400;500;600&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
    <style>
        :root {
            --muji-beige: #F5F4F0;
            --muji-beige-dark: #EBE9E1;
            --muji-red: #7f2029;
            --muji-text: #333333;
            --muji-gray: #8c8c8c;
            --aura-color: rgba(220, 210, 190, 0.4);
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: var(--muji-beige);
            color: var(--muji-text);
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            background: linear-gradient(180deg, #F9F8F6 0%, var(--muji-beige) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            filter: saturate(0.8) contrast(0.95) brightness(1.05);
        }

        .bg-layer.active { opacity: 0.25; }

        .glass-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px;
            box-shadow: 
                0 10px 40px -10px rgba(0,0,0,0.03),
                0 20px 80px -20px rgba(130, 120, 110, 0.1);
        }

        .countdown-wrapper {
            position: relative;
            padding: 40px;
        }

        .countdown-circle {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 20px 60px -10px rgba(0,0,0,0.06),
                inset 0 2px 10px rgba(255,255,255,1),
                inset 0 -2px 15px rgba(0,0,0,0.02);
            z-index: 2;
        }

        @media (min-width: 640px) {
            .countdown-circle { width: 340px; height: 340px; }
        }

        .breathing-aura {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, var(--aura-color) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            animation: breath 8s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95);
            pointer-events: none;
        }

        @keyframes breath {
            0%, 100% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.2; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.5; }
        }

        .countdown-svg { 
            position: absolute;
            top: 0; left: 0;
            transform: rotate(-90deg); 
            width: 100%; height: 100%; 
            pointer-events: none;
        }

        .countdown-progress {
            fill: none;
            stroke: var(--muji-red);
            stroke-width: 3; 
            stroke-linecap: round;
            transition: stroke-dashoffset 2s ease;
            opacity: 0.35;
        }

        #daysLeft {
            font-size: 7rem;
            font-weight: 500;
            letter-spacing: -0.05em;
            color: #1A1A1A;
            line-height: 1;
        }

        @media (min-width: 640px) {
            #daysLeft { font-size: 8.5rem; }
        }

        .main-title {
            font-weight: 600;
            letter-spacing: 0.3em;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; 
            text-align: center;
            aspect-ratio: 1 / 0.85;
            overflow: hidden; 
        }

        .input-label {
            font-size: 9px;
            color: #AAA;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .input-box {
            border-bottom: 1px solid rgba(0,0,0,0.03);
            padding-bottom: 8px;
            width: 100%;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .input-box:hover { border-color: var(--muji-red); }

        input[type="datetime-local"] {
            appearance: none;
            -webkit-appearance: none;
            text-align: center;
            width: 100%;
            background: transparent;
            padding: 0;
            margin: 0;
            display: block;
        }

        #cityModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(245, 244, 240, 0.9);
            backdrop-filter: blur(20px);
        }

        .animate-muji { animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-container">
        <div id="bg1" class="bg-layer active"></div>
        <div id="bg2" class="bg-layer"></div>
    </div>

    <header class="w-full max-w-5xl flex justify-between items-center px-8 py-8 z-10">
        <span id="currentTime" class="text-[10px] font-medium tracking-[0.4em] text-gray-400 uppercase">Archive — 00:00:00</span>
    </header>

    <main class="w-full max-w-2xl flex flex-col items-center z-10 px-6">
        <div id="milestoneArea" class="h-20 flex flex-col items-center justify-center mb-4 w-full text-center">
            <!-- JS 動態填充 -->
        </div>

        <div class="text-center mb-6 w-full flex flex-col items-center">
            <!-- 國家名稱已刪除 -->
            <div class="flex items-center justify-center gap-3 mt-4">
                <span id="destIcon" class="text-2xl opacity-80">🇯🇵</span>
                <h1 id="mainDestTitle" class="main-title text-3xl text-gray-900 uppercase">Sapporo</h1>
            </div>
            <p id="localTimeDisplay" class="text-[9px] text-gray-400 tracking-[0.4em] mt-4 uppercase font-bold opacity-60">Current / --:--:--</p>
        </div>

        <div class="countdown-wrapper mb-6">
            <div class="breathing-aura"></div>
            <div class="countdown-circle">
                <svg class="countdown-svg" viewBox="0 0 360 360">
                    <circle class="fill-none stroke-black/[0.02]" cx="180" cy="180" r="175" stroke-width="1"></circle>
                    <circle id="progressBar" class="countdown-progress" cx="180" cy="180" r="175" stroke-dasharray="1100" stroke-dashoffset="1100"></circle>
                </svg>
                
                <div class="relative flex flex-col items-center">
                    <div class="relative flex items-center justify-center">
                        <div id="daysLeft">00</div>
                        <span class="absolute -right-6 bottom-4 text-[10px] font-bold text-gray-300 uppercase tracking-widest">Days</span>
                    </div>
                    
                    <div class="flex items-center gap-6 mt-2 opacity-40">
                        <div class="flex flex-col items-center">
                            <span id="hoursUnit" class="text-sm font-light">00</span>
                            <span class="text-[6px] uppercase tracking-tighter">Hrs</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <span id="minsUnit" class="text-sm font-light">00</span>
                            <span class="text-[6px] uppercase tracking-tighter">Min</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <span id="secsUnit" class="text-sm font-light">00</span>
                            <span class="text-[6px] uppercase tracking-tighter">Sec</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card w-full p-8 md:p-10 mb-20 flex flex-col items-center">
            <!-- 頂部輸入區 -->
            <div class="w-full flex flex-col gap-6 mb-10 text-center">
                <div id="openCityModal" class="input-box">
                    <span class="input-label">Destination</span>
                    <div id="selectedCityText" class="text-base font-medium text-gray-800 tracking-wide">Sapporo, Japan</div>
                </div>
                <div class="input-box">
                    <span class="input-label">Departure Date</span>
                    <input type="datetime-local" id="dateInput" class="text-base font-medium text-gray-800 outline-none">
                </div>
            </div>

            <!-- 底部資訊方格 -->
            <div class="info-grid">
                <div class="info-box">
                    <span class="input-label">Weather</span>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="weatherIcon" class="text-xl">☀️</span>
                        <span id="weatherTemp" class="text-sm font-medium text-gray-700">--°C</span>
                    </div>
                    <p id="weatherDetails" class="text-[7px] text-gray-400 tracking-widest mt-2 uppercase">Stable Atmosphere</p>
                </div>
                <div class="info-box">
                    <span class="input-label">Currency</span>
                    <div class="flex flex-col items-center justify-center mt-1">
                        <span class="text-lg">⚖️</span>
                        <span id="currencyRef" class="text-[11px] leading-tight font-medium text-gray-700 mt-1">--</span>
                    </div>
                    <p class="text-[7px] text-gray-400 tracking-widest mt-2 uppercase">Exchange Rate</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 選擇視窗 -->
    <div id="cityModal" class="items-center justify-center p-8">
        <div class="w-full max-w-lg animate-muji">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-sm font-medium tracking-[0.4em] text-gray-800 uppercase">Selection</h2>
                <button id="closeCityModal" class="text-gray-400 hover:text-black transition-colors text-xl font-thin">✕</button>
            </div>
            <div class="flex gap-8 mb-8 overflow-x-auto no-scrollbar border-b border-gray-100 pb-2" id="modalTabs"></div>
            <div class="max-h-[50vh] overflow-y-auto no-scrollbar" id="cityList"></div>
        </div>
    </div>

    <script>
        let targetDate = new Date();
        let currentCity = null;
        const bgLayers = [document.getElementById('bg1'), document.getElementById('bg2')];
        let bgIdx = 0;

        const destinations = {
            "Japan": [
                { name: "Sapporo", country: "Japan", full: "Sapporo, Japan", icon: "🇯🇵", query: "sapporo,minimal,zen", tz: 9, cur: "JPY" },
                { name: "Kyoto", country: "Japan", full: "Kyoto, Japan", icon: "🇯🇵", query: "kyoto,zen,shrine", tz: 9, cur: "JPY" },
                { name: "Naoshima", country: "Japan", full: "Naoshima, Japan", icon: "🇯🇵", query: "naoshima,museum", tz: 9, cur: "JPY" }
            ],
            "Asia": [
                { name: "Taipei", country: "Taiwan", full: "Taipei, Taiwan", icon: "🇹🇼", query: "taipei,101,minimal", tz: 8, cur: "TWD" },
                { name: "Seoul", country: "Korea", full: "Seoul, Korea", icon: "🇰🇷", query: "seoul,hanok,minimal", tz: 9, cur: "KRW" }
            ],
            "Europe": [
                { name: "Copenhagen", country: "Denmark", full: "Copenhagen, Denmark", icon: "🇩🇰", query: "copenhagen,nordic,design", tz: 1, cur: "DKK" },
                { name: "Helsinki", country: "Finland", full: "Helsinki, Finland", icon: "🇫🇮", query: "helsinki,minimalism", tz: 2, cur: "EUR" }
            ]
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('currentTime').innerText = `Archive — ${now.toLocaleTimeString('en-GB', { hour12: false })}`;
            if (currentCity) {
                const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                const local = new Date(utc + (3600000 * currentCity.tz));
                document.getElementById('localTimeDisplay').innerText = `Destination Time / ${local.toLocaleTimeString('en-GB', { hour12: false })} (GMT+${currentCity.tz})`;
            }
        }

        function setBackground(city) {
            const next = (bgIdx + 1) % 2;
            const url = `https://images.unsplash.com/featured/?${encodeURIComponent(city.query)}`;
            const img = new Image();
            img.src = url;
            img.onload = () => {
                bgLayers[next].style.backgroundImage = `url('${url}')`;
                bgLayers[bgIdx].classList.remove('active');
                bgLayers[next].classList.add('active');
                bgIdx = next;
            };
        }

        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;
            const el = { d: document.getElementById('daysLeft'), h: document.getElementById('hoursUnit'), m: document.getElementById('minsUnit'), s: document.getElementById('secsUnit') };
            
            if (diff <= 0) {
                Object.values(el).forEach(e => e.innerText = "00");
                document.getElementById('progressBar').style.strokeDashoffset = 1100;
                checkMilestone(0);
                return;
            }
            
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            el.d.innerText = d.toString().padStart(2, '0');
            el.h.innerText = h.toString().padStart(2, '0');
            el.m.innerText = m.toString().padStart(2, '0');
            el.s.innerText = s.toString().padStart(2, '0');
            
            const total = 100 * 86400000;
            const p = Math.max(0, Math.min(100, (1 - diff/total) * 100));
            document.getElementById('progressBar').style.strokeDashoffset = 1100 - (p/100 * 1100);
            checkMilestone(d);
        }

        function checkMilestone(d) {
            const area = document.getElementById('milestoneArea');
            let zh = "", en = "";
            
            if (d === 0) { zh = "就是今天！帶上好心情出發吧"; en = "Today is the day! Let's go."; }
            else if (d === 1) { zh = "明天就要出發了，檢查一下護照喔！✨"; en = "Leaving tomorrow! Check your passport."; }
            else if (d <= 5) { zh = "快到了！這幾天先研究當地必吃美食 🍱"; en = "Almost there! Search for local food."; }
            else if (d <= 15) { zh = "剩下兩週左右，期待與最美的風景相遇 🌱"; en = "A few weeks left. Ready for your journey?"; }
            else { zh = "「Simple is not just simple」"; en = "A way of living gracefully."; }
            
            if (area.getAttribute('data-content') !== zh) {
                area.innerHTML = `
                    <div class="milestone-text animate-muji flex flex-col items-center gap-2">
                        <p class="text-sm font-medium tracking-[0.2em] text-gray-700">${zh}</p>
                        <p class="text-[7px] text-gray-400 tracking-[0.4em] uppercase">${en}</p>
                    </div>
                `;
                area.setAttribute('data-content', zh);
            }
        }

        function initModal() {
            const tabs = document.getElementById('modalTabs');
            const list = document.getElementById('cityList');
            Object.keys(destinations).forEach((reg, i) => {
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap pb-1 text-[9px] font-bold uppercase tracking-widest ${i===0?'text-black border-b border-black':'text-gray-300'}`;
                btn.innerText = reg;
                btn.onclick = () => {
                    document.querySelectorAll('#modalTabs button').forEach(b => { b.classList.remove('text-black', 'border-b', 'border-black'); b.classList.add('text-gray-300'); });
                    btn.classList.add('text-black', 'border-b', 'border-black');
                    renderCities(reg);
                };
                tabs.appendChild(btn);
            });
            function renderCities(reg) {
                list.innerHTML = "";
                destinations[reg].forEach(city => {
                    const item = document.createElement('div');
                    item.className = "flex justify-between items-center py-5 border-b border-gray-50 cursor-pointer group";
                    item.innerHTML = `
                        <span class="text-xs font-normal text-gray-500 group-hover:text-black transition-colors tracking-widest uppercase">${city.name}</span>
                        <span class="text-[7px] text-gray-300 group-hover:text-gray-500 tracking-tighter uppercase">Pick</span>
                    `;
                    item.onclick = () => selectCity(city);
                    list.appendChild(item);
                });
            }
            renderCities(Object.keys(destinations)[0]);
        }

        function selectCity(city) {
            currentCity = city;
            document.getElementById('selectedCityText').innerText = city.full;
            document.getElementById('mainDestTitle').innerText = city.name;
            document.getElementById('destIcon').innerText = city.icon;
            const curMap = { JPY: "4.67", KRW: "42.1", TWD: "1.0", DKK: "0.22", EUR: "0.03" };
            document.getElementById('currencyRef').innerText = `1 TWD ≈ ${curMap[city.cur] || '--'} ${city.cur}`;
            setBackground(city);
            document.getElementById('cityModal').style.display = 'none';
            updateWeather();
        }

        function updateWeather() {
            const icons = ["☀️", "☁️", "🌫️", "🌦️"];
            const idx = Math.floor(Math.random() * icons.length);
            document.getElementById('weatherIcon').innerText = icons[idx];
            document.getElementById('weatherTemp').innerText = `${Math.floor(Math.random()*12+3)}°C`;
        }

        document.getElementById('openCityModal').onclick = () => document.getElementById('cityModal').style.display = 'flex';
        document.getElementById('closeCityModal').onclick = () => document.getElementById('cityModal').style.display = 'none';

        function init() {
            initModal();
            selectCity(destinations["Japan"][0]);
            const d = new Date(); d.setDate(d.getDate() + 30); d.setHours(10, 0);
            document.getElementById('dateInput').value = d.toISOString().slice(0, 16);
            targetDate = new Date(document.getElementById('dateInput').value);
            setInterval(updateClock, 1000);
            setInterval(updateCountdown, 1000);
            document.getElementById('dateInput').onchange = (e) => targetDate = new Date(e.target.value);
            updateClock();
            updateCountdown();
        }
        window.onload = init;
    </script>
</body>
</html>
