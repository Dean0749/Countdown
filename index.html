<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Travel Countdown - MUJI Edition v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --muji-beige: #F5F4F0;
            --muji-red: #7f2029;
            --muji-text: #1a1a1a;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: var(--muji-beige);
            color: var(--muji-text);
            margin: 0;
            overflow: hidden; /* 鎖定滾動，改用全屏切換 */
            height: 100vh;
            touch-action: none;
        }

        .bg-container {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .bg-layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            filter: brightness(0.95);
        }

        .bg-layer.active { opacity: 0.3; }

        /* 沉浸式頂部陰影 */
        .scrim-top {
            position: absolute;
            top: 0; left: 0; right: 0; height: 30vh;
            background: linear-gradient(to bottom, rgba(245,244,240,0.8) 0%, transparent 100%);
            z-index: 1;
        }

        /* 核心倒數圓環優化 */
        .countdown-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (min-width: 640px) {
            .countdown-container { width: 380px; height: 380px; }
        }

        .progress-ring {
            position: absolute;
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        #progressBar {
            stroke: var(--muji-red);
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 玻璃擬態卡片 - 底部對齊 */
        .action-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 40px 40px 0 0;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 32px 24px 48px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.05);
            z-index: 20;
            transform: translateY(0);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 自定義按鈕 */
        .btn-pill {
            background: white;
            padding: 14px 24px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
            transition: all 0.2s;
        }
        .btn-pill:active { transform: scale(0.96); background: #fafafa; }

        /* 滑動提示語 */
        .swipe-hint {
            position: fixed;
            bottom: 240px;
            left: 0; right: 0;
            text-align: center;
            font-size: 8px;
            color: #aaa;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            animation: bounceLeftRight 2s infinite;
        }

        @keyframes bounceLeftRight {
            0%, 100% { transform: translateX(0); opacity: 0.3; }
            50% { transform: translateX(10px); opacity: 0.8; }
        }

        input[type="datetime-local"] {
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 500;
            width: 100%;
            text-align: center;
            color: #333;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 城市選單優化 */
        #cityDrawer {
            position: fixed;
            inset: 0;
            background: rgba(245,244,240,0.98);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
        }
        #cityDrawer.active { transform: translateY(0); }

    </style>
</head>
<body>
    <div class="scrim-top"></div>
    <div class="bg-container">
        <div id="bg1" class="bg-layer active"></div>
        <div id="bg2" class="bg-layer"></div>
    </div>

    <!-- 頂部資訊列 -->
    <div class="fixed top-12 w-full px-8 flex justify-between items-end z-10">
        <div>
            <p id="localTimeDisplay" class="text-[9px] font-bold tracking-[0.3em] opacity-40 uppercase mb-1">Dest Time / --:--:--</p>
            <div class="flex items-center gap-2">
                <span id="destIcon" class="text-xl">🇯🇵</span>
                <h1 id="mainDestTitle" class="text-2xl font-semibold tracking-widest uppercase">Sapporo</h1>
            </div>
        </div>
        <div class="text-right">
            <span id="currentTime" class="text-[9px] font-bold tracking-widest opacity-40">18:30:45</span>
        </div>
    </div>

    <!-- 核心倒數區 (支援手勢左右滑動) -->
    <main id="swipeArea" class="h-screen w-full flex flex-col items-center justify-center px-6">
        <div id="milestoneArea" class="h-12 mb-4 text-center">
            <!-- 情感化語句 -->
        </div>

        <div class="countdown-container">
            <div class="breathing-aura"></div>
            <svg class="progress-ring" viewBox="0 0 340 340">
                <circle cx="170" cy="170" r="160" fill="none" stroke="rgba(0,0,0,0.02)" stroke-width="2"></circle>
                <circle id="progressBar" cx="170" cy="170" r="160" fill="none" stroke-width="3" stroke-linecap="round"></circle>
            </svg>
            
            <div class="flex flex-col items-center z-10">
                <div class="relative">
                    <span id="daysLeft" class="text-[120px] font-light leading-none tracking-tighter">00</span>
                    <span class="absolute -right-6 bottom-4 text-[10px] font-bold text-gray-300 uppercase tracking-widest">Days</span>
                </div>
                <div class="flex gap-4 opacity-40 mt-2">
                    <span id="hmsDisplay" class="text-xs font-medium tracking-widest uppercase">00H 00M 00S</span>
                </div>
            </div>
        </div>

        <div class="swipe-hint">Swipe to Switch City</div>
    </main>

    <!-- 底部操作卡片 (符合拇指操作範圍) -->
    <div class="action-card">
        <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-8"></div>
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="flex flex-col gap-2">
                <span class="text-[9px] text-gray-400 font-bold uppercase tracking-widest ml-4">Current Weather</span>
                <div class="btn-pill">
                    <span id="weatherIcon" class="text-xl">☀️</span>
                    <div class="flex flex-col">
                        <span id="weatherTemp" class="text-sm font-semibold">12°C</span>
                        <span class="text-[8px] text-gray-400 uppercase tracking-tighter">Sapporo</span>
                    </div>
                </div>
            </div>
            <div class="flex flex-col gap-2">
                <span class="text-[9px] text-gray-400 font-bold uppercase tracking-widest ml-4">Currency Rate</span>
                <div class="btn-pill">
                    <span class="text-lg">⚖️</span>
                    <div class="flex flex-col">
                        <span id="currencyRef" class="text-sm font-semibold">4.67</span>
                        <span id="curCode" class="text-[8px] text-gray-400 uppercase tracking-tighter">TWD/JPY</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <button id="openCityModal" class="btn-pill justify-center py-4 bg-black/[0.03]">
                <span class="text-[10px] font-bold uppercase tracking-[0.3em]">Explore Destinations</span>
            </button>
            <div class="btn-pill flex-col py-4">
                <span class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Departure Time</span>
                <input type="datetime-local" id="dateInput">
            </div>
        </div>
    </div>

    <!-- 全屏城市抽屜 -->
    <div id="cityDrawer">
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-xs font-bold tracking-[0.5em] uppercase text-gray-400">Where to next?</h2>
            <button id="closeCityModal" class="p-2">✕</button>
        </div>
        <div id="cityList" class="flex-1 overflow-y-auto no-scrollbar space-y-2">
            <!-- JS 動態生成 -->
        </div>
    </div>

    <script>
        const destinations = [
            { id: "jp-sap", name: "Sapporo", full: "Sapporo, Japan", icon: "🇯🇵", query: "sapporo,winter,minimal", tz: 9, cur: "JPY", rate: "4.67" },
            { id: "jp-kyo", name: "Kyoto", full: "Kyoto, Japan", icon: "🇯🇵", query: "kyoto,zen,minimal", tz: 9, cur: "JPY", rate: "4.67" },
            { id: "as-tpe", name: "Taipei", full: "Taipei, Taiwan", icon: "🇹🇼", query: "taipei,urban,minimal", tz: 8, cur: "TWD", rate: "1.00" },
            { id: "as-sel", name: "Seoul", full: "Seoul, Korea", icon: "🇰🇷", query: "seoul,city,minimal", tz: 9, cur: "KRW", rate: "42.1" },
            { id: "eu-cph", name: "Copenhagen", full: "Copenhagen, Denmark", icon: "🇩🇰", query: "copenhagen,design,nordic", tz: 1, cur: "DKK", rate: "0.22" }
        ];

        let currentIndex = 0;
        let targetDate = new Date();
        const bgLayers = [document.getElementById('bg1'), document.getElementById('bg2')];
        let bgIdx = 0;

        // 手勢偵測
        let touchStartX = 0;
        let touchEndX = 0;

        function handleGesture() {
            if (touchEndX < touchStartX - 50) nextCity();
            if (touchEndX > touchStartX + 50) prevCity();
        }

        function nextCity() {
            currentIndex = (currentIndex + 1) % destinations.length;
            selectCity(destinations[currentIndex]);
        }

        function prevCity() {
            currentIndex = (currentIndex - 1 + destinations.length) % destinations.length;
            selectCity(destinations[currentIndex]);
        }

        function selectCity(city, shouldSave = true) {
            const cityIdx = destinations.findIndex(d => d.id === city.id);
            if (cityIdx !== -1) currentIndex = cityIdx;

            document.getElementById('mainDestTitle').innerText = city.name;
            document.getElementById('destIcon').innerText = city.icon;
            document.getElementById('currencyRef').innerText = city.rate;
            document.getElementById('curCode').innerText = `TWD / ${city.cur}`;
            
            // 背景平滑切換
            const nextBg = (bgIdx + 1) % 2;
            const url = `https://images.unsplash.com/featured/?${encodeURIComponent(city.query)}`;
            const img = new Image();
            img.src = url;
            img.onload = () => {
                bgLayers[nextBg].style.backgroundImage = `url('${url}')`;
                bgLayers[bgIdx].classList.remove('active');
                bgLayers[nextBg].classList.add('active');
                bgIdx = nextBg;
            };

            if (shouldSave) {
                localStorage.setItem('travel_city_id', city.id);
            }
            updateWeather();
        }

        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;
            const daysEl = document.getElementById('daysLeft');
            const hmsEl = document.getElementById('hmsDisplay');
            const progress = document.getElementById('progressBar');

            if (diff <= 0) {
                daysEl.innerText = "00";
                hmsEl.innerText = "00H 00M 00S";
                progress.style.strokeDashoffset = 1000;
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            daysEl.innerText = d.toString().padStart(2, '0');
            hmsEl.innerText = `${h}H ${m}M ${s}S`;

            // 進度條動畫 (以 100 天為基準)
            const circumference = 2 * Math.PI * 160;
            const p = Math.max(0, Math.min(1, diff / (100 * 86400000)));
            progress.style.strokeDasharray = circumference;
            progress.style.strokeDashoffset = circumference * p;
            
            checkMilestone(d);
        }

        function checkMilestone(d) {
            const area = document.getElementById('milestoneArea');
            let text = d === 0 ? "Enjoy your journey today!" : `Only ${d} days until your escape.`;
            if (area.innerText !== text) {
                area.innerHTML = `<p class="text-[10px] font-medium tracking-[0.4em] uppercase text-black/40 animate-pulse">${text}</p>`;
            }
        }

        function updateWeather() {
            const temps = ["12°C", "15°C", "8°C", "19°C"];
            document.getElementById('weatherTemp').innerText = temps[Math.floor(Math.random()*temps.length)];
        }

        // 初始化
        function init() {
            const savedCityId = localStorage.getItem('travel_city_id');
            const savedDate = localStorage.getItem('travel_target_date');

            // 渲染城市列表
            const list = document.getElementById('cityList');
            destinations.forEach(city => {
                const item = document.createElement('div');
                item.className = "flex justify-between items-center p-6 bg-white/50 rounded-3xl border border-transparent active:border-black/5 transition-all";
                item.innerHTML = `<span class="text-sm tracking-widest uppercase font-medium">${city.full}</span><span>${city.icon}</span>`;
                item.onclick = () => {
                    selectCity(city);
                    document.getElementById('cityDrawer').classList.remove('active');
                };
                list.appendChild(item);
            });

            if (savedCityId) {
                const city = destinations.find(d => d.id === savedCityId) || destinations[0];
                selectCity(city, false);
            } else {
                selectCity(destinations[0], false);
            }

            if (savedDate) {
                document.getElementById('dateInput').value = savedDate;
                targetDate = new Date(savedDate);
            } else {
                const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 30);
                const val = tomorrow.toISOString().slice(0, 16);
                document.getElementById('dateInput').value = val;
                targetDate = new Date(val);
            }

            // 事件綁定
            document.getElementById('swipeArea').addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
            document.getElementById('swipeArea').addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleGesture();
            });

            document.getElementById('dateInput').onchange = (e) => {
                targetDate = new Date(e.target.value);
                localStorage.setItem('travel_target_date', e.target.value);
            };

            document.getElementById('openCityModal').onclick = () => document.getElementById('cityDrawer').classList.add('active');
            document.getElementById('closeCityModal').onclick = () => document.getElementById('cityDrawer').classList.remove('active');

            setInterval(() => {
                const now = new Date();
                document.getElementById('currentTime').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
                updateCountdown();
            }, 1000);
        }

        window.onload = init;
    </script>
</body>
</html>
